<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Intently — Design System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,400&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; background: #f0eee9; font-family: "Inter", system-ui, sans-serif; color: #2B2118; -webkit-font-smoothing: antialiased; }
  * { box-sizing: border-box; }
  @keyframes intentlyWave { from { transform: scaleY(0.45); } to { transform: scaleY(1); } }
  @keyframes intentlyBreath { 0%,100% { transform: scale(1); opacity: 0.2; } 50% { transform: scale(1.18); opacity: 0; } }
  @keyframes intentlySpin { to { transform: rotate(360deg); } }
  @keyframes intentlyPulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
  @keyframes intentlyFade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes intentlyMenuIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  ::-webkit-scrollbar { display: none; }
  * { scrollbar-width: none; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="intently-tokens.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="intently-imagery.jsx"></script>
<script type="text/babel" src="intently-cards.jsx"></script>
<script type="text/babel" src="intently-hero.jsx"></script>
<script type="text/babel" src="intently-glyphs.jsx"></script>
<script type="text/babel" src="intently-journal.jsx"></script>
<script type="text/babel" src="intently-projects.jsx"></script>
<script type="text/babel" src="intently-screens.jsx"></script>
<script type="text/babel" src="intently-shell.jsx"></script>

<script type="text/babel" data-presets="react">
function Phone({ children }) {
  return (
    <IOSDevice width={390} height={844}>
      <div style={{ position: 'absolute', inset: 0, background: T.color.PrimarySurface, overflow: 'hidden' }}>
        <IOSStatusBar />
        {children}
      </div>
    </IOSDevice>
  );
}

function PrototypePhone() {
  const [idx, setIdx] = React.useState(1);
  const [heroState, setHeroState] = React.useState('idle');
  const [undoneMap, setUndone] = React.useState({});
  const [openProject, setOpenProject] = React.useState(null);
  React.useEffect(() => {
    if (heroState === 'processing') {
      const id = setTimeout(() => setHeroState('idle'), 1800);
      return () => clearTimeout(id);
    }
  }, [heroState]);
  const onUndo = (key) => setUndone(m => ({ ...m, [key]: true }));
  const micDim = heroState === 'listening' || heroState === 'expanded';
  return (
    <Phone>
      <div style={{ position: 'absolute', top: 44, left: 0, right: 0, bottom: 0 }}>
        <SwipeShell index={idx} onIndex={setIdx}>
          {[
            <PastJournal key="p" initialZoom="Week" />,
            <PresentScreen key="c" undoneMap={undoneMap} onUndo={onUndo}/>,
            <FutureScreen key="f" onOpenProject={setOpenProject}/>,
          ]}
        </SwipeShell>
      </div>
      {openProject && (
        <div style={{ position: 'absolute', top: 44, left: 0, right: 0, bottom: 0, zIndex: 40, animation: 'intentlyFade 200ms ease' }}>
          <ProjectDetail p={openProject} onBack={() => setOpenProject(null)} />
        </div>
      )}
      <TenseNav index={idx} onIndex={setIdx} dim={micDim} />
      <HeroAffordance state={heroState} onChange={setHeroState} />
    </Phone>
  );
}

// ─── Hero moment — the App Store shot ────────────────────────
// Revamp: the quiet morning pre-brief. One painterly highlight from yesterday,
// this week's goals as a hushed list, and one big CTA inviting you into the brief.
// No mic clutter, no confirmation cards. The point is the invitation itself.
function HeroMoment() {
  return (
    <Phone>
      <div style={{ position: 'absolute', top: 44, left: 0, right: 0, bottom: 0, overflow: 'hidden' }}>
        <PresentScreen phase="morning" />
      </div>
      <TenseNav index={1} onIndex={()=>{}} />
      <HeroAffordance state="idle" onChange={()=>{}} />
    </Phone>
  );
}

function HeroAffordanceArtboard({ children, h = 520 }) {
  return (
    <div style={{ width: 390, height: h, background: T.color.PrimarySurface, position: 'relative', overflow: 'hidden' }}>
      {children}
    </div>
  );
}

function CardArtboard({ children, h = 340 }) {
  return (
    <div style={{ width: 400, height: h, background: T.color.PrimarySurface, padding: 20, display: 'flex', position: 'relative' }}>
      <DotGridBackdrop />
      <div style={{ margin: 'auto', width: '100%', position: 'relative' }}>{children}</div>
    </div>
  );
}

function TokenSwatch({ name, value, note, on }) {
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 14, padding: '10px 2px' }}>
      <div style={{ width: 56, height: 56, borderRadius: 12, background: value, border: `1px solid ${T.color.EdgeLine}`, flexShrink: 0, display: 'inline-flex', alignItems: 'center', justifyContent: 'center', color: on || 'transparent', fontFamily: T.font.Display, fontSize: 18, fontWeight: 600, fontStyle: 'italic' }}>{on ? 'Aa' : ''}</div>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ fontFamily: T.font.UI, fontSize: 13, fontWeight: 700, color: T.color.PrimaryText }}>{name}</div>
        <div style={{ fontFamily: T.font.Mono, fontSize: 11, color: T.color.SupportingText }}>{value}</div>
        {note && <div style={{ fontFamily: T.font.UI, fontSize: 11, color: T.color.SubtleText, marginTop: 2 }}>{note}</div>}
      </div>
    </div>
  );
}

function TypeSpecimen({ name, spec, sample }) {
  return (
    <div style={{ padding: '12px 0', borderBottom: `1px solid ${T.color.EdgeLine}` }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 6 }}>
        <span style={{ fontFamily: T.font.UI, fontSize: 12, fontWeight: 700, color: T.color.PrimaryText }}>{name}</span>
        <span style={{ fontFamily: T.font.Mono, fontSize: 10, color: T.color.SupportingText }}>{spec.family} · {spec.size}/{spec.lineHeight} · w{spec.weight}</span>
      </div>
      <div style={{ fontFamily: T.font[spec.family], fontSize: spec.size, lineHeight: spec.lineHeight + 'px', fontWeight: spec.weight, letterSpacing: spec.letterSpacing, color: T.color.PrimaryText, fontStyle: spec.italic ? 'italic' : 'normal' }}>{sample}</div>
    </div>
  );
}

function App() {
  return (
    <DesignCanvas>
      <DCSection id="hero" title="1 · Hero moment" subtitle="Daily Brief — painterly sunrise panel, serif italic salutation, one confirmation card. Pinterest collage energy, Tomorrow's block-color confidence.">
        <DCArtboard id="hero-moment" label="Daily Brief · App Store shot" width={390} height={844}>
          <HeroMoment />
        </DCArtboard>
        <DCArtboard id="live-proto" label="Live — swipe + tap the mic" width={390} height={844}>
          <PrototypePhone />
        </DCArtboard>
      </DCSection>

      <DCSection id="shell" title="2 · Three-screen shell" subtitle="Past · Present · Future. Tense nav moves to the bottom as a compact pill. Past becomes a zoomable journal — Year · Month · Week · Day — like Apple Calendar, but visual.">
        <DCArtboard id="shell-past-week" label="Past · Week (default zoom)" width={390} height={844}>
          <Phone>
            <div style={{ position: 'absolute', top: 44, left: 0, right: 0, bottom: 0, overflow: 'hidden' }}><PastJournal initialZoom="Week" /></div>
            <TenseNav index={0} onIndex={()=>{}} />
            <HeroAffordance state="idle" onChange={()=>{}} />
          </Phone>
        </DCArtboard>
        <DCArtboard id="shell-present-morning" label="Present — morning (pre-brief)" width={390} height={844}>
          <Phone>
            <div style={{ position: 'absolute', top: 44, left: 0, right: 0, bottom: 0, overflow: 'hidden' }}><PresentScreen phase="morning" /></div>
            <TenseNav index={1} onIndex={()=>{}} />
            <HeroAffordance state="idle" onChange={()=>{}} />
          </Phone>
        </DCArtboard>
        <DCArtboard id="shell-present" label="Present — today's plan" width={390} height={844}>
          <Phone>
            <div style={{ position: 'absolute', top: 44, left: 0, right: 0, bottom: 0, overflow: 'hidden' }}><PresentScreen phase="planned" /></div>
            <TenseNav index={1} onIndex={()=>{}} />
            <HeroAffordance state="idle" onChange={()=>{}} />
          </Phone>
        </DCArtboard>
        <DCArtboard id="shell-present-evening" label="Present — end of day" width={390} height={844}>
          <Phone>
            <div style={{ position: 'absolute', top: 44, left: 0, right: 0, bottom: 0, overflow: 'hidden' }}><PresentScreen phase="evening" /></div>
            <TenseNav index={1} onIndex={()=>{}} />
            <HeroAffordance state="idle" onChange={()=>{}} />
          </Phone>
        </DCArtboard>
        <DCArtboard id="shell-future" label="Future — this month's goals" width={390} height={844}>
          <Phone>
            <div style={{ position: 'absolute', top: 44, left: 0, right: 0, bottom: 0, overflow: 'hidden' }}><FutureScreen /></div>
            <TenseNav index={2} onIndex={()=>{}} />
            <HeroAffordance state="idle" onChange={()=>{}} />
          </Phone>
        </DCArtboard>
        <DCArtboard id="shell-future-projects" label="Future — projects, at the bottom" width={390} height={844}>
          <Phone>
            <div style={{ position: 'absolute', top: 44, left: 0, right: 0, bottom: 0, overflow: 'hidden' }}><FutureScreen scroll="projects" /></div>
            <TenseNav index={2} onIndex={()=>{}} />
            <HeroAffordance state="idle" onChange={()=>{}} />
          </Phone>
        </DCArtboard>
      </DCSection>

      <DCSection id="past-journal" title="2b · Past — zoomable art-journal" subtitle="Zoom: Year (365 glyphs) → Month (big glyphs per day) → Week (agent's summary + outcomes + key moments) → Day (chronological entries, archive pulls). Tap a day in any view to drop in one level.">
        <DCArtboard id="past-year" label="Year — 2026 at a glance" width={390} height={844}>
          <Phone>
            <div style={{ position: 'absolute', top: 44, left: 0, right: 0, bottom: 0, overflow: 'hidden' }}><PastJournal initialZoom="Year" /></div>
            <TenseNav index={0} onIndex={()=>{}} />
            <HeroAffordance state="idle" onChange={()=>{}} />
          </Phone>
        </DCArtboard>
        <DCArtboard id="past-month" label="Month — April" width={390} height={844}>
          <Phone>
            <div style={{ position: 'absolute', top: 44, left: 0, right: 0, bottom: 0, overflow: 'hidden' }}><PastJournal initialZoom="Month" /></div>
            <TenseNav index={0} onIndex={()=>{}} />
            <HeroAffordance state="idle" onChange={()=>{}} />
          </Phone>
        </DCArtboard>
        <DCArtboard id="past-week" label="Week — weekly review surface" width={390} height={844}>
          <Phone>
            <div style={{ position: 'absolute', top: 44, left: 0, right: 0, bottom: 0, overflow: 'hidden' }}><PastJournal initialZoom="Week" /></div>
            <TenseNav index={0} onIndex={()=>{}} />
            <HeroAffordance state="idle" onChange={()=>{}} />
          </Phone>
        </DCArtboard>
        <DCArtboard id="past-day" label="Day — entries, chronologically" width={390} height={844}>
          <Phone>
            <div style={{ position: 'absolute', top: 44, left: 0, right: 0, bottom: 0, overflow: 'hidden' }}><PastJournal initialZoom="Day" /></div>
            <TenseNav index={0} onIndex={()=>{}} />
            <HeroAffordance state="idle" onChange={()=>{}} />
          </Phone>
        </DCArtboard>
      </DCSection>

      <DCSection id="projects" title="2c · Projects" subtitle="Not kanban, not Gantt. A grid of project cards under the Goals chapter covers; tap opens a simple markdown + tracker sheet. The Job Hunt flow from your Obsidian vault, tightened for mobile.">
        <DCArtboard id="project-detail-jobhunt" label="Project · Job Hunt" width={390} height={844}>
          <Phone>
            <div style={{ position: 'absolute', top: 44, left: 0, right: 0, bottom: 0, overflow: 'hidden' }}><ProjectDetail p={PROJECT_DATA[0]} onBack={()=>{}} /></div>
            <HeroAffordance state="idle" onChange={()=>{}} />
          </Phone>
        </DCArtboard>
        <DCArtboard id="project-detail-pitch" label="Project · Pitch deck v3" width={390} height={844}>
          <Phone>
            <div style={{ position: 'absolute', top: 44, left: 0, right: 0, bottom: 0, overflow: 'hidden' }}><ProjectDetail p={PROJECT_DATA[1]} onBack={()=>{}} /></div>
            <HeroAffordance state="idle" onChange={()=>{}} />
          </Phone>
        </DCArtboard>
      </DCSection>

      <DCSection id="glyphs" title="2d · The 40 daily-mark glyphs" subtitle="One gets stamped on a day whenever the user produced any entry — brief, review, chat, journal. Agent picks based on content. Fallback: dot.">
        <DCArtboard id="glyph-palette" label="Daily-mark palette" width={540} height={420}>
          <div style={{ width: 540, height: 420, background: T.color.SecondarySurface, padding: 20, overflowY: 'auto' }}>
            <div style={{ fontFamily: T.font.UI, fontSize: 11, fontWeight: 700, letterSpacing: 1.2, textTransform: 'uppercase', color: T.color.SupportingText, marginBottom: 12 }}>40 glyphs · Lucide-sourced</div>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(8, 1fr)', gap: 10 }}>
              {GLYPH_NAMES.map(n => (
                <div key={n} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4, padding: 8, background: T.color.PrimarySurface, border: `1px solid ${T.color.EdgeLine}`, borderRadius: 8 }}>
                  <Glyph name={n} size={22} color={T.color.PrimaryText} stroke={1.75} />
                  <span style={{ fontFamily: T.font.UI, fontSize: 9, color: T.color.SubtleText, letterSpacing: 0.3 }}>{n}</span>
                </div>
              ))}
            </div>
          </div>
        </DCArtboard>
      </DCSection>

      <DCSection id="cards" title="3 · Card types" subtitle="Each card type carries its own tint. The Confirmation card is butter-yellow with a peach Undo — warm, findable, not alarm-red.">
        <DCArtboard id="plan-collapsed" label="Plan · collapsed" width={400} height={400}>
          <CardArtboard h={400}>
            <PlanCard expanded={false} blocks={[
              { label: 'AM', time: '9–12', title: 'Deep work — data slide' },
              { label: 'PM', time: '1–5',  title: '1:1 Anya, ops screens' },
              { label: 'EVE', time: '7pm', title: 'Dinner with M.' },
            ]}/>
          </CardArtboard>
        </DCArtboard>
        <DCArtboard id="plan-expanded" label="Plan · expanded" width={400} height={520}>
          <CardArtboard h={520}>
            <PlanCard expanded={true} blocks={[
              { label: 'AM', time: '9–12', title: 'Deep work — data slide', detail: 'Close Slack, close mail, one pass.' },
              { label: 'PM', time: '1–5',  title: '1:1 Anya, ops screens (3)', detail: 'Same 5 questions for each.' },
              { label: 'EVE', time: '7pm', title: 'Dinner with M.', detail: 'Walk first — 20 min. Leave the laptop home.' },
            ]}/>
          </CardArtboard>
        </DCArtboard>

        <DCArtboard id="journal" label="Journal · with landscape panel" width={400} height={440}>
          <CardArtboard h={440}>
            <JournalCard date="Yesterday" mood="dusk"
              pullQuote="I don't want to manage, I want to build."
              body="Named the thing that's been bothering me about the ops hire on the walk with M. The relief of saying it out loud." />
          </CardArtboard>
        </DCArtboard>
        <DCArtboard id="journal-forest" label="Journal · forest mood" width={400} height={440}>
          <CardArtboard h={440}>
            <JournalCard date="Sunday" mood="forest"
              pullQuote="Slept through the night."
              body="First full night in a week. Waking up, the shoulders didn't get tight before the feet hit the floor. Noted." />
          </CardArtboard>
        </DCArtboard>

        <DCArtboard id="confirm-default" label="Confirmation · default (butter + sage banner)" width={400} height={500}>
          <CardArtboard h={500}>
            <ConfirmationCard
              action="Moved the Thursday pitch to Friday 9am."
              because="Anya's out Thursday pm, and you wrote last night that you wanted a fresh head."
              inputs={[
                { label: 'Calendar', icon: Icon.Calendar, dot: T.color.InputTraceCalendar },
                { label: 'Journal', icon: Icon.Journal, dot: T.color.InputTraceJournal },
              ]}
              time="Moved 7 min ago"
              confidence="high"
              onUndo={()=>{}}
            />
          </CardArtboard>
        </DCArtboard>
        <DCArtboard id="confirm-undone" label="Confirmation · undone (learning surfaced)" width={400} height={500}>
          <CardArtboard h={500}>
            <ConfirmationCard
              action="Moved the Thursday pitch to Friday 9am."
              because="Anya's out Thursday pm, and you wrote last night that you wanted a fresh head."
              inputs={[
                { label: 'Calendar', icon: Icon.Calendar, dot: T.color.InputTraceCalendar },
                { label: 'Journal', icon: Icon.Journal, dot: T.color.InputTraceJournal },
              ]}
              time="Undone · 30s ago"
              confidence="high"
              undone={true}
              onUndo={()=>{}}
            />
          </CardArtboard>
        </DCArtboard>
        <DCArtboard id="confirm-uncertain" label="Confirmation · low confidence (peach, dashed)" width={400} height={420}>
          <CardArtboard h={420}>
            <ConfirmationCard
              action="Decline the 4pm sync from Raj?"
              because="You flagged 3 of his last 4 meetings as low-signal. No agenda."
              inputs={[
                { label: 'Journal', icon: Icon.Journal, dot: T.color.InputTraceJournal },
                { label: 'Email', icon: Icon.Mail, dot: T.color.InputTraceEmail },
              ]}
              time="Waiting on you"
              confidence="low"
              heroImage={false}
              onUndo={()=>{}}
            />
          </CardArtboard>
        </DCArtboard>
      </DCSection>

      <DCSection id="hero-aff" title="4 · Hero affordance" subtitle="One persistent control, bottom-right. Tap = voice. Press-hold = menu. Four states.">
        <DCArtboard id="ha-idle" label="Idle" width={390} height={520}>
          <HeroAffordanceArtboard>
            <div style={{ padding: 36, opacity: 0.6, fontFamily: T.font.Reading, fontSize: 17, color: T.color.PrimaryText, lineHeight: '26px' }}>…the rest of the screen sits here. The mic disc breathes a subtle ring every 3.6s — alive, not demanding.</div>
            <HeroAffordance state="idle" onChange={()=>{}} />
          </HeroAffordanceArtboard>
        </DCArtboard>
        <DCArtboard id="ha-listening" label="Listening — full-screen takeover" width={390} height={520}>
          <HeroAffordanceArtboard><HeroListening onDone={()=>{}} /></HeroAffordanceArtboard>
        </DCArtboard>
        <DCArtboard id="ha-processing" label="Processing — calm, in place" width={390} height={520}>
          <HeroAffordanceArtboard>
            <div style={{ padding: 36, opacity: 0.6, fontFamily: T.font.Reading, fontSize: 17, color: T.color.PrimaryText, lineHeight: '26px' }}>The mic becomes a rotating arc. Copy stays. Nothing jumps.</div>
            <HeroAffordance state="processing" onChange={()=>{}} />
          </HeroAffordanceArtboard>
        </DCArtboard>
        <DCArtboard id="ha-expanded" label="Expanded — press-hold menu" width={390} height={520}>
          <HeroAffordanceArtboard>
            <div style={{ position: 'absolute', inset: 0, background: 'rgba(47,38,27,0.1)' }} />
            <HeroAffordance state="expanded" onChange={()=>{}} />
          </HeroAffordanceArtboard>
        </DCArtboard>
        <DCArtboard id="ha-chat" label="Chat — full surface, mixed voice + text, inline actions with Undo" width={390} height={720}>
          <HeroAffordanceArtboard h={720}><HeroChat onDone={()=>{}} onMic={()=>{}} /></HeroAffordanceArtboard>
        </DCArtboard>
      </DCSection>

      <DCSection id="tokens" title="5 · Tokens — roles, not colors" subtitle="Every name is a role. Reskinnable without rename.">
        <DCArtboard id="tok-surfaces" label="Surfaces & text" width={420} height={560}>
          <div style={{ width: 420, height: 560, background: T.color.SecondarySurface, padding: 20, overflowY: 'auto' }}>
            <TokenSwatch name="PrimarySurface" value="#F5EEE0" note="warm linen" />
            <TokenSwatch name="SecondarySurface" value="#FBF6EA" />
            <TokenSwatch name="PrimaryText" value="#2B2118" note="13.4:1 on PrimarySurface — AA ✓" on="#F5EEE0" />
            <TokenSwatch name="SupportingText" value="#6E604D" note="5.6:1 — AA ✓" on="#F5EEE0" />
            <TokenSwatch name="SubtleText" value="#9A8A72" note="4.5:1 — AA body-min ✓" on="#F5EEE0" />
            <TokenSwatch name="LinkText" value="#B56A3F" note="4.7:1 · paired with underline" on="#F5EEE0" />
          </div>
        </DCArtboard>
        <DCArtboard id="tok-card-tints" label="Card tints (the painterly palette)" width={420} height={560}>
          <div style={{ width: 420, height: 560, background: T.color.SecondarySurface, padding: 20, overflowY: 'auto' }}>
            <TokenSwatch name="TintSage" value="#8CB39A" note="QuestCard / Tracker — Tomorrow DNA" on="#FBF6EA"/>
            <TokenSwatch name="TintLilac" value="#CFC9EB" note="ReflectionCard / Journal — Pinterest pastel" />
            <TokenSwatch name="TintButter" value="#F1DE8A" note="ConfirmationCard — warm trust surface" />
            <TokenSwatch name="TintPeach" value="#F0B98C" note="Undo affordance fill" />
            <TokenSwatch name="TintClay" value="#C66B3F" note="CTA ink on peach · 4.5:1 ✓" on="#F0B98C"/>
            <TokenSwatch name="TintMoss" value="#3A4E3A" note="InverseText on butter" on="#F1DE8A"/>
            <TokenSwatch name="TintDusk" value="#8E8FC6" note="Tracker · in-progress" on="#FBF6EA"/>
            <TokenSwatch name="TintMint" value="#B8D9C0" note="soft sage for list rails" />
          </div>
        </DCArtboard>
        <DCArtboard id="tok-type" label="Type scale · Fraunces italic leads" width={540} height={700}>
          <div style={{ width: 540, height: 700, background: T.color.SecondarySurface, padding: 24, overflowY: 'auto' }}>
            <div style={{ fontFamily: T.font.UI, fontSize: 11, fontWeight: 700, letterSpacing: 1.4, textTransform: 'uppercase', color: T.color.SupportingText, marginBottom: 8 }}>Fraunces (italic display) · Source Serif · Inter</div>
            <TypeSpecimen name="DisplayXL italic" spec={{ family: 'Display', size: 44, lineHeight: 48, weight: 500, letterSpacing: -0.8, italic: true }} sample="Good morning." />
            <TypeSpecimen name="DisplayL italic"  spec={{ family: 'Display', size: 34, lineHeight: 40, weight: 500, letterSpacing: -0.6, italic: true }} sample="A quieter day." />
            <TypeSpecimen name="DisplayM italic"  spec={{ family: 'Display', size: 28, lineHeight: 34, weight: 500, letterSpacing: -0.4, italic: true }} sample="Series A pitch" />
            <TypeSpecimen name="HeadingL"   spec={{ family: 'Display', size: 22, lineHeight: 28, weight: 600, letterSpacing: -0.2 }} sample="Moved your pitch to Friday." />
            <TypeSpecimen name="ReadingL"   spec={{ family: 'Reading', size: 19, lineHeight: 30, weight: 400, letterSpacing: 0 }} sample="Long-form prose. Generous leading." />
            <TypeSpecimen name="BodyM"      spec={{ family: 'UI', size: 15, lineHeight: 22, weight: 400, letterSpacing: -0.1 }} sample="UI chrome, labels, fields." />
            <TypeSpecimen name="Label"      spec={{ family: 'UI', size: 12, lineHeight: 16, weight: 700, letterSpacing: 0.4 }} sample="ALL-CAPS EYEBROWS" />
          </div>
        </DCArtboard>
      </DCSection>

      <DCSection id="reading" title="6 · Reading mode" subtitle="When a user opens a long-form file — goals, daily log, weekly review, journal — the app enters Reading mode. Painterly header, wide measure, dropcap, generous leading. The rest of the UI recedes.">
        <DCArtboard id="read-journal" label="Journal entry · dusk cover" width={390} height={844}>
          <Phone>
            <div style={{ position: 'absolute', top: 44, left: 0, right: 0, bottom: 0, overflow: 'auto', background: T.color.SecondarySurface }}>
              <LandscapePanel mood="dusk" style={{ height: 280, position: 'relative' }}>
                <div style={{ position: 'absolute', top: 16, left: 20, right: 20, display: 'flex', justifyContent: 'space-between', alignItems: 'center', color: '#FBF6EA' }}>
                  <button style={{ background: 'rgba(47,38,27,0.3)', border: 'none', borderRadius: 999, width: 36, height: 36, display: 'inline-flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer' }}>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#FBF6EA" strokeWidth="2.5" strokeLinecap="round"><path d="m15 18-6-6 6-6"/></svg>
                  </button>
                  <div style={{ fontFamily: T.font.UI, fontSize: 11, fontWeight: 700, letterSpacing: 1.2, textTransform: 'uppercase', opacity: 0.9 }}>Journal · Sunday</div>
                  <button style={{ background: 'rgba(47,38,27,0.3)', border: 'none', borderRadius: 999, width: 36, height: 36, display: 'inline-flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer' }}>
                    <Icon.More size={16} color="#FBF6EA" />
                  </button>
                </div>
              </LandscapePanel>
              <div style={{ padding: '28px 42px 120px', marginTop: -32, background: T.color.SecondarySurface, borderTopLeftRadius: 24, borderTopRightRadius: 24, position: 'relative' }}>
                <div style={{ fontFamily: T.font.UI, fontSize: 11, fontWeight: 700, letterSpacing: 1.4, textTransform: 'uppercase', color: T.color.TintClay, marginBottom: 6 }}>Sunday walk · 4 min read</div>
                <div style={{ fontFamily: T.font.Display, fontSize: 32, lineHeight: '38px', fontStyle: 'italic', fontWeight: 500, letterSpacing: -0.6, color: T.color.PrimaryText }}>The cofounder conversation</div>
                <div style={{ display: 'flex', alignItems: 'center', gap: 10, margin: '14px 0 20px', fontFamily: T.font.UI, fontSize: 12, color: T.color.SupportingText }}>
                  <span style={{ width: 28, height: 28, borderRadius: 999, background: T.color.TintSage, display: 'inline-flex', alignItems: 'center', justifyContent: 'center', color: '#FBF6EA', fontFamily: T.font.Display, fontWeight: 600, fontSize: 13 }}>S</span>
                  Sam · April 20
                </div>
                <p style={{ fontFamily: T.font.Reading, fontSize: 19, lineHeight: '32px', color: T.color.PrimaryText, margin: '0 0 18px' }}>
                  <span style={{ fontFamily: T.font.Display, fontSize: 64, lineHeight: '52px', fontWeight: 500, float: 'left', marginRight: 10, marginTop: 6, color: T.color.TintClay, fontStyle: 'italic' }}>N</span>
                  amed the thing that's been bothering me about the ops hire on the walk with M. The relief of saying it out loud surprised me — it had been sitting in the back of my head for weeks, and the act of forming the sentence loosened something.
                </p>
                <p style={{ fontFamily: T.font.Reading, fontSize: 19, lineHeight: '32px', color: T.color.PrimaryText, margin: '0 0 18px' }}>
                  I don't want to manage. I want to build. The shape of the company I've been sketching assumes a version of me that spends Tuesdays in 1:1s — and that version isn't the one who gets out of bed happy.
                </p>
                <blockquote style={{ margin: '20px -4px', paddingLeft: 16, borderLeft: `3px solid ${T.color.TintClay}`, fontFamily: T.font.Display, fontSize: 22, fontStyle: 'italic', lineHeight: '30px', color: T.color.TintMoss }}>
                  The shape of the company has to come from the shape of the person running it.
                </blockquote>
                <p style={{ fontFamily: T.font.Reading, fontSize: 19, lineHeight: '32px', color: T.color.PrimaryText, margin: '0 0 18px' }}>
                  Noted for the next 1:1 with Anya. The question is whether to reframe the role before the screens, or after.
                </p>
              </div>
            </div>
          </Phone>
        </DCArtboard>

        <DCArtboard id="read-weekly" label="Weekly review · long-form" width={390} height={844}>
          <Phone>
            <div style={{ position: 'absolute', top: 44, left: 0, right: 0, bottom: 0, overflow: 'auto', background: T.color.SecondarySurface }}>
              <MorningLight style={{ height: 180, padding: 22, display: 'flex', flexDirection: 'column', justifyContent: 'flex-end', color: '#FBF6EA' }}>
                <div style={{ fontFamily: T.font.UI, fontSize: 11, fontWeight: 700, letterSpacing: 1.2, textTransform: 'uppercase', opacity: 0.9 }}>Week 17 · review</div>
                <div style={{ fontFamily: T.font.Display, fontSize: 30, lineHeight: '34px', fontStyle: 'italic', fontWeight: 500, marginTop: 4, letterSpacing: -0.5 }}>Okay week. Not great.</div>
              </MorningLight>
              <div style={{ padding: '24px 26px 120px' }}>
                <div style={{ display: 'flex', gap: 10, marginBottom: 20 }}>
                  {[
                    { k: 'Shipped', v: '2 / 3', tint: T.color.TintSage },
                    { k: 'Deep hrs', v: '11', tint: T.color.TintLilac },
                    { k: 'Sleep avg', v: '6.4', tint: T.color.TintButter },
                  ].map((s,i) => (
                    <div key={i} style={{ flex: 1, background: s.tint, borderRadius: 14, padding: 12 }}>
                      <div style={{ fontFamily: T.font.UI, fontSize: 10, fontWeight: 700, letterSpacing: 0.6, textTransform: 'uppercase', color: T.color.TintMoss, opacity: 0.75 }}>{s.k}</div>
                      <div style={{ fontFamily: T.font.Display, fontSize: 22, fontWeight: 600, color: T.color.TintMoss, marginTop: 2 }}>{s.v}</div>
                    </div>
                  ))}
                </div>
                <h3 style={{ fontFamily: T.font.Display, fontSize: 20, fontStyle: 'italic', fontWeight: 500, letterSpacing: -0.2, margin: '0 0 10px', color: T.color.PrimaryText }}>What moved</h3>
                <p style={{ fontFamily: T.font.Reading, fontSize: 18, lineHeight: '30px', color: T.color.PrimaryText, margin: '0 0 14px' }}>Shipped the pitch rewrite and the data-room restructure. The third — exec summary — slipped because I kept saying yes to calls.</p>
                <h3 style={{ fontFamily: T.font.Display, fontSize: 20, fontStyle: 'italic', fontWeight: 500, letterSpacing: -0.2, margin: '18px 0 10px', color: T.color.PrimaryText }}>What I'm noticing</h3>
                <p style={{ fontFamily: T.font.Reading, fontSize: 18, lineHeight: '30px', color: T.color.PrimaryText, margin: '0 0 14px' }}>Calendar gets eaten by low-signal meetings on Tuesdays. Block them next week. Sleep dipped mid-week after two investor nights.</p>
              </div>
            </div>
          </Phone>
        </DCArtboard>
      </DCSection>

      <DCSection id="writeup" title="7 · How it hangs together" subtitle="Type, spacing, motion, reskin test.">
        <DCArtboard id="essay" label="Notes for Claude Code" width={720} height={900}>
          <div style={{ width: 720, height: 900, background: T.color.SecondarySurface, padding: 40, overflowY: 'auto', fontFamily: T.font.Reading, color: T.color.PrimaryText }}>
            <div style={{ fontFamily: T.font.UI, fontSize: 11, fontWeight: 700, letterSpacing: 1.4, textTransform: 'uppercase', color: T.color.SupportingText }}>Design notes</div>
            <h1 style={{ fontFamily: T.font.Display, fontSize: 40, lineHeight: '46px', fontWeight: 500, letterSpacing: -0.8, margin: '6px 0 16px', fontStyle: 'italic' }}>Intently — visual system</h1>

            <h2 style={{ fontFamily: T.font.Display, fontSize: 22, fontWeight: 600, margin: '20px 0 8px', letterSpacing: -0.2 }}>Type pairing</h2>
            <p style={{ fontFamily: T.font.Reading, fontSize: 17, lineHeight: '27px', margin: '0 0 12px' }}>
              <b>Fraunces italic</b> carries the voice — salutations, card titles, pull-quotes. The italic is intentional; it gives the interface a handwritten cadence that reads as <i>someone thought about this</i>, not <i>a machine rendered it</i>.
              <b> Source Serif 4</b> is the reading face (journal body, daily-brief prose) at 17–19/27–30. <b>Inter</b> only for eyebrows, chips, and numeric readouts.
            </p>

            <h2 style={{ fontFamily: T.font.Display, fontSize: 22, fontWeight: 600, margin: '20px 0 8px', letterSpacing: -0.2 }}>Imagery is a first-class token</h2>
            <p style={{ fontFamily: T.font.Reading, fontSize: 17, lineHeight: '27px', margin: '0 0 12px' }}>
              Every card carries a painterly surface, not a chrome border. Sage blocks for agent-work cards (Tracker, FeatureCard), butter-yellow for Confirmation (the trust surface reads warm, not alarm), lilac with a landscape panel for Journal, peach-dashed for uncertainty. Placeholders (<span style={{ fontFamily: T.font.Mono, fontSize: 15 }}>PainterlyBlock</span>, <span style={{ fontFamily: T.font.Mono, fontSize: 15 }}>LandscapePanel</span>, <span style={{ fontFamily: T.font.Mono, fontSize: 15 }}>MorningLight</span>) are swap-sites for real art later — the system is designed around imagery existing, not around text as default.
            </p>

            <h2 style={{ fontFamily: T.font.Display, fontSize: 22, fontWeight: 600, margin: '20px 0 8px', letterSpacing: -0.2 }}>Spacing</h2>
            <p style={{ fontFamily: T.font.Reading, fontSize: 17, lineHeight: '27px', margin: '0 0 12px' }}>
              4-pt base (<span style={{ fontFamily: T.font.Mono, fontSize: 15 }}>4 · 8 · 12 · 16 · 24 · 32 · 48 · 64</span>). Card padding 22, gutter 14, screen-inset 24. Undo is 52pt tall (trust-surface exception).
            </p>

            <h2 style={{ fontFamily: T.font.Display, fontSize: 22, fontWeight: 600, margin: '20px 0 8px', letterSpacing: -0.2 }}>Motion</h2>
            <p style={{ fontFamily: T.font.Reading, fontSize: 17, lineHeight: '27px', margin: '0 0 12px' }}>
              Under 300ms, decelerating. Swipe tracks the finger with edge rubberband. Ring-progress animates 900ms (noticeable, not celebratory). Idle mic breathes every 3.6s.
            </p>

            <h2 style={{ fontFamily: T.font.Display, fontSize: 22, fontWeight: 600, margin: '20px 0 8px', letterSpacing: -0.2 }}>Reskin test</h2>
            <p style={{ fontFamily: T.font.Reading, fontSize: 17, lineHeight: '27px', margin: '0 0 12px' }}>
              <span style={{ fontFamily: T.font.Mono, fontSize: 15 }}>QuestCard</span> → quest scroll; <span style={{ fontFamily: T.font.Mono, fontSize: 15 }}>FocusObject</span> → rune; <span style={{ fontFamily: T.font.Mono, fontSize: 15 }}>ConfirmationCard</span> → proclamation. The <i>painterly layer</i> is already abstracted — swap <span style={{ fontFamily: T.font.Mono, fontSize: 15 }}>PainterlyBlock</span> palette arrays and the reskin follows.
            </p>
          </div>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}
