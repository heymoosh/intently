name: auto-merge-safe

# Classifies auto/* PRs opened by scheduled routines and acts per policy:
#   - Mechanical paths only (routine-output / TRACKER.md / session-handoff.md)
#     → auto-merge once security.yml passes. No human review.
#   - Any docs/config change (docs/**, CLAUDE.md, .gitignore, etc.)
#     → flip ready-for-review, label, comment. Muxin reviews (reads these).
#   - Any code change (agents/**, app/**, supabase/**, tests/**, evals/{datasets,rubrics,baselines}/**)
#     → leave as draft, explanatory comment. Waits for ci.yml (Thursday Apr 23).
#
# Triggered after security.yml completes so we know gitleaks passed before acting.

on:
  workflow_run:
    workflows: [security]
    types: [completed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to classify (manual test run)
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  classify-and-act:
    runs-on: ubuntu-latest
    # Only act on successful security runs for auto/* branches (or manual dispatch).
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.event == 'pull_request' &&
       github.event.workflow_run.conclusion == 'success' &&
       startsWith(github.event.workflow_run.head_branch, 'auto/'))
    steps:
      - name: Resolve PR number
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PR="${{ inputs.pr_number }}"
          else
            PR=$(gh pr list --repo "$REPO" \
              --head "${{ github.event.workflow_run.head_branch }}" \
              --state open --json number --jq '.[0].number // empty')
          fi
          if [ -z "$PR" ]; then
            echo "No open PR; nothing to do."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "number=$PR" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Classify changed files
        id: scope
        if: steps.pr.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR: ${{ steps.pr.outputs.number }}
        run: |
          set -euo pipefail
          FILES=$(gh pr view "$PR" --repo "$REPO" --json files --jq '.files[].path')
          echo "Changed files:"
          echo "$FILES"

          MECHANICAL_RE='^(\.claude/routine-output/|\.claude/session-handoff\.md$|TRACKER\.md$)'
          CODE_RE='^(agents/|app/|supabase/|tests/|evals/(datasets|rubrics|baselines)/|scripts/|\.githooks/)'

          ALL_MECHANICAL=true
          ANY_CODE=false
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            if ! echo "$f" | grep -qE "$MECHANICAL_RE"; then
              ALL_MECHANICAL=false
            fi
            if echo "$f" | grep -qE "$CODE_RE"; then
              ANY_CODE=true
            fi
          done <<< "$FILES"

          echo "all_mechanical=$ALL_MECHANICAL" >> "$GITHUB_OUTPUT"
          echo "any_code=$ANY_CODE" >> "$GITHUB_OUTPUT"

      - name: Auto-merge mechanical PR
        if: steps.pr.outputs.skip != 'true' && steps.scope.outputs.all_mechanical == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR: ${{ steps.pr.outputs.number }}
        run: |
          set -euo pipefail
          # Flip from draft if still drafted by the routine; idempotent.
          gh pr ready "$PR" --repo "$REPO" || true
          gh pr merge "$PR" --repo "$REPO" --squash --delete-branch --admin

      - name: Flip docs/config PR to ready-for-review
        if: steps.pr.outputs.skip != 'true' && steps.scope.outputs.all_mechanical != 'true' && steps.scope.outputs.any_code != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR: ${{ steps.pr.outputs.number }}
        run: |
          set -euo pipefail
          gh pr ready "$PR" --repo "$REPO" || true
          gh pr edit "$PR" --repo "$REPO" --add-label needs-muxin-review || true
          gh pr comment "$PR" --repo "$REPO" --body \
            "Auto-classified: docs/config only. security.yml passed. Marked ready for review (you read these)."

      - name: Leave code PR as draft with note
        if: steps.pr.outputs.skip != 'true' && steps.scope.outputs.any_code == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR: ${{ steps.pr.outputs.number }}
        run: |
          set -euo pipefail
          gh pr comment "$PR" --repo "$REPO" --body \
            "Auto-classified: touches code. Staying as draft until ci.yml exists (Thursday Apr 23 stack decision). Do not merge without lint/typecheck/tests running."
