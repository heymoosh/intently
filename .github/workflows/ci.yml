name: ci

# Fast unit+typecheck gate for every PR.
# Runs the Expo app's `npm run typecheck` and `npm run test:unit` in under a
# minute. Paired with security.yml (gitleaks) as the two deterministic gates
# that auto-merge-safe.yml waits on before merging code PRs.
#
# Stack: Expo SDK 54 · TypeScript 5.9 · tsx-based node:test runner.
# Required commands live in app/package.json scripts.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  typecheck-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Typecheck
        run: npm run typecheck

      - name: Unit + integration tests
        run: npm run test:unit
