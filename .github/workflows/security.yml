name: security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Nightly sweep at 04:00 UTC (00:00 EDT)
    - cron: '0 4 * * *'

# gitleaks-action needs pull-requests:read to list PR commits for scanning.
# Without this, the action 403s on `/repos/OWNER/REPO/pulls/NN/commits` and
# fails the job even when there are no actual secrets. Default GITHUB_TOKEN
# permissions no longer grant this implicitly — must be declared.
permissions:
  contents: read
  pull-requests: read
  issues: read

jobs:
  secrets-scan:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Fails the job on any committed secret. Bitwarden Secrets Manager
        # is the only allowed secrets store for Intently — see
        # docs/security/privacy-policy-for-builders.md.

  deps-audit:
    name: npm audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      # Threshold is `high` rather than `moderate` because the repo currently
      # has 12 pre-existing moderate vulnerabilities inside Expo's internal
      # dependency tree that cannot be resolved without major breaking changes
      # (npm audit fix --force would downgrade expo to v46). Raise back to
      # `--audit-level=moderate` once those are resolved upstream.
      - name: Audit (fail on high or critical)
        run: npm audit --audit-level=high
