name: doc-map-check

# When an upstream doc with known downstream consumers changes, post a
# reminder comment on the PR + add `needs-user-review` label so auto-merge-safe
# doesn't merge before downstream alignment is confirmed. Source of truth for
# dependencies: docs/architecture/doc-map.md.
#
# Paired with .githooks/pre-commit which emits the same nudge locally. The
# hook is a heads-up; this CI is the enforcement layer.

on:
  pull_request:
    paths:
      - 'docs/product/requirements/life-ops-plugin-spec.md'
      - 'docs/design/app-experience.md'
      - 'docs/architecture/data-model.md'
      - 'docs/architecture/agent-memory.md'
      - 'launch-plan.md'

permissions:
  contents: read
  pull-requests: write

jobs:
  remind-and-label:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: List upstream docs changed in this PR
        id: changed
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          UPSTREAM_RE='^(docs/product/requirements/life-ops-plugin-spec\.md|docs/design/app-experience\.md|docs/architecture/data-model\.md|docs/architecture/agent-memory\.md)$'
          CHANGED=$(git diff --name-only "$BASE" "$HEAD" | grep -E "$UPSTREAM_RE" || true)
          echo "Changed upstream docs:"
          echo "$CHANGED"
          {
            echo "list<<EOF"
            echo "$CHANGED"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Post reminder + add needs-user-review label
        if: steps.changed.outputs.list != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
          CHANGED: ${{ steps.changed.outputs.list }}
        run: |
          set -euo pipefail
          MARKER='<!-- doc-map-check -->'
          EXISTING=$(gh pr view "$PR" --repo "$REPO" --json comments \
            --jq "[.comments[].body | select(contains(\"$MARKER\"))] | length")
          if [ "$EXISTING" = "0" ]; then
            FORMATTED=$(printf '  - `%s`\n' $CHANGED)
            BODY="$MARKER
          **Doc-map check:** upstream doc(s) changed in this PR:
          $FORMATTED

          Per \`docs/architecture/doc-map.md\`, downstream consumers may need updates in the same PR (or confirmed to still align). Common downstreams:
          - \`docs/product/acceptance-criteria/*.md\` — re-derive via \`/derive-criteria <skill>\` if a spec anchor changed
          - \`agents/*/SKILL.md\` — confirm skill flow still matches
          - \`evals/rubrics/\` — confirm scoring still aligns
          - UI components in \`app/\` — confirm token/layout consumers still match
          - \`TRACKER.md\` — if \`launch-plan.md\` changed, confirm "Next (in order)" still ladders up to the updated milestones

          Adding \`needs-user-review\` label so auto-merge-safe holds until verified. Remove the label once downstream alignment is confirmed."
            gh pr comment "$PR" --repo "$REPO" --body "$BODY"
            gh pr edit "$PR" --repo "$REPO" --add-label needs-user-review
          fi
