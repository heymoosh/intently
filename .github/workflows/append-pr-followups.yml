name: tracker-pr-sync

# Sync TRACKER.md from merged PR bodies. Two parsers run on every merge to main:
#
#   1. ## TRACKER updates  → apply each tracker-replace block as a literal
#      find/with replacement against TRACKER.md. Use this to mark follow-ups
#      [Resolved], rewrite the Status block, reorder the Next queue, etc.
#
#   2. ## Manual follow-ups → append each bullet to TRACKER.md's
#      "## Follow-ups (pending manual or flight-test)" section, with a
#      back-link to the PR. Use this for new manual follow-ups the PR surfaces.
#
# Both sections are optional; absent/empty → no-op. Headings are exact and
# case-sensitive. Both run in one python invocation, one commit, one push.
#
# Convention for ## TRACKER updates:
#
#     ## TRACKER updates
#
#     ```tracker-replace
#     === FIND
#     - **Vercel project Root Directory must be empty (repo root)**...
#     === WITH
#     - **[Resolved 2026-04-25] Vercel cutover live.** ...
#     ```
#
# Multiple blocks allowed. Each FIND must match TRACKER.md exactly once;
# zero or multiple matches fail the workflow loudly so the PR author fixes
# the convention. Multi-line FIND/WITH supported — everything between the
# markers is taken literally (no escaping).
#
# Convention for ## Manual follow-ups:
#
#     ## Manual follow-ups
#     - User needs to grant Linear OAuth scope
#     - [ ] Provision X in Supabase console
#
# Both "- " and "* " markers work. Checkbox markers (`[ ]`, `[x]`) are
# preserved so the bullet renders as a checklist item in TRACKER.
#
# Note: this workflow does NOT apply to its own merge. The OLD workflow
# runs on the merge that introduces the new behavior; effects start with
# the next PR after that.

on:
  pull_request:
    types: [closed]

permissions:
  contents: write
  pull-requests: read

jobs:
  sync:
    if: github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Sync TRACKER.md from PR body
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          set -euo pipefail
          python3 - <<'PYEOF'
          import os, re, sys

          body = os.environ.get("PR_BODY") or ""
          pr_num = os.environ["PR_NUMBER"]
          pr_url = os.environ["PR_URL"]

          path = "TRACKER.md"
          with open(path) as f:
              content = f.read()

          changed = False

          # ──────────────────────────────────────────────────────────────────
          # Pass 1: ## TRACKER updates → apply tracker-replace blocks
          # ──────────────────────────────────────────────────────────────────
          m = re.search(
              r"^##\s+TRACKER updates\s*$(.*?)(?=^##\s|\Z)",
              body,
              re.MULTILINE | re.DOTALL,
          )
          if m:
              section = m.group(1)
              # Find every ```tracker-replace ... ``` block
              blocks = re.findall(
                  r"^```tracker-replace\s*$\n(.*?)^```\s*$",
                  section,
                  re.MULTILINE | re.DOTALL,
              )
              if not blocks:
                  print("'## TRACKER updates' present but no tracker-replace blocks; skipping pass 1.")
              for i, block in enumerate(blocks, 1):
                  # Split on === WITH (each block has exactly one FIND and one WITH)
                  parts = re.split(r"^===\s*WITH\s*$", block, maxsplit=1, flags=re.MULTILINE)
                  if len(parts) != 2:
                      print(f"Block {i}: missing '=== WITH' separator; aborting.", file=sys.stderr)
                      sys.exit(1)
                  find_part, with_part = parts
                  # Strip the leading === FIND marker from find_part
                  find_part = re.sub(r"^===\s*FIND\s*$\n?", "", find_part, count=1, flags=re.MULTILINE)
                  # Strip surrounding newlines from both parts. The split on
                  # `=== WITH` leaves a leading \n on with_part; trailing \n on
                  # both comes from the line break before the next marker / fence.
                  find_text = find_part.strip("\n")
                  with_text = with_part.strip("\n")
                  if not find_text:
                      print(f"Block {i}: empty FIND text; aborting.", file=sys.stderr)
                      sys.exit(1)
                  count = content.count(find_text)
                  if count == 0:
                      print(f"Block {i}: FIND text not found in {path}; aborting.", file=sys.stderr)
                      print(f"--- FIND was ---\n{find_text}\n--- end ---", file=sys.stderr)
                      sys.exit(1)
                  if count > 1:
                      print(f"Block {i}: FIND text matched {count} times (must be exactly 1); aborting.", file=sys.stderr)
                      print(f"--- FIND was ---\n{find_text}\n--- end ---", file=sys.stderr)
                      sys.exit(1)
                  content = content.replace(find_text, with_text, 1)
                  print(f"Block {i}: applied replacement ({len(find_text)} chars → {len(with_text)} chars).")
                  changed = True
          else:
              print("No '## TRACKER updates' section; skipping pass 1.")

          # ──────────────────────────────────────────────────────────────────
          # Pass 2: ## Manual follow-ups → append bullets
          # ──────────────────────────────────────────────────────────────────
          m = re.search(
              r"^##\s+Manual follow-ups\s*$(.*?)(?=^##\s|\Z)",
              body,
              re.MULTILINE | re.DOTALL,
          )
          if m:
              bullets = [
                  line.rstrip()
                  for line in m.group(1).splitlines()
                  if re.match(r"^[-*]\s+\S", line)
              ]
              if bullets:
                  tagged = []
                  for b in bullets:
                      text = re.sub(r"^[-*]\s+", "", b)
                      tagged.append(f"- {text} ([PR #{pr_num}]({pr_url}))")

                  heading = "## Follow-ups (pending manual or flight-test)"
                  if heading not in content:
                      print(f"Heading '{heading}' not found in {path}; aborting.", file=sys.stderr)
                      sys.exit(1)

                  before, after = content.split(heading, 1)
                  content = (
                      before
                      + heading
                      + "\n\n"
                      + "\n".join(tagged)
                      + "\n"
                      + after.lstrip("\n")
                  )
                  print(f"Appended {len(tagged)} follow-up(s) under '{heading}'.")
                  changed = True
              else:
                  print("Empty '## Manual follow-ups' section; skipping pass 2.")
          else:
              print("No '## Manual follow-ups' section; skipping pass 2.")

          if changed:
              with open(path, "w") as f:
                  f.write(content)
          else:
              print("No changes to TRACKER.md.")
          PYEOF

          if git diff --quiet TRACKER.md; then
            echo "TRACKER.md unchanged; nothing to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add TRACKER.md
          git commit -m "Sync TRACKER from PR #${PR_NUMBER}"

          # Race guard: if another PR merged between checkout and now and
          # already pushed to main, rebase and retry.
          for attempt in 1 2 3; do
            if git push origin main; then
              echo "Pushed on attempt $attempt."
              exit 0
            fi
            echo "Push rejected; rebasing on origin/main and retrying (attempt $attempt)."
            git fetch origin main
            git rebase origin/main || {
              echo "Rebase failed — manual TRACKER conflict needs human resolution."
              exit 1
            }
          done

          echo "Push failed after 3 attempts."
          exit 1
